name: Deploy demo to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Configure Pages base path
        env:
          PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}
        run: |
          if [[ -n "$PAGES_BASE_PATH" ]]; then
            echo "VITE_BASE_PATH=$PAGES_BASE_PATH" >> "$GITHUB_ENV"
          else
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            if [[ "$REPO_NAME" == *.github.io ]]; then
              echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
            else
              echo "VITE_BASE_PATH=/$REPO_NAME/" >> "$GITHUB_ENV"
            fi
          fi

      - name: Build demo
        run: npm run demo:build
        env:
          VITE_LLM_PROXY_URL: ${{ vars.LLM_PROXY_URL }}
          VITE_DEEPSEEK_PROXY_URL: ${{ vars.DEEPSEEK_PROXY_URL }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
