name: Build demo and mini program

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Configure base path
        run: echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"

      - name: Mini Program preflight
        run: npm run mini:preflight

      - name: Build demo
        run: npm run demo:build
